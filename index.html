    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "@id": "https://vyaparix.store/#faq",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Vyaparix and how does it help my business?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vyaparix is India's smartest modern billing, inventory, and GST accounting software designed for MSMEs, wholesalers, retailers, and distributors. It simplifies GST invoice creation, tracks stock balances in real-time, automates khata ledger entries, sends invoice links on WhatsApp, and generates GST reports."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need internet to use Vyaparix?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Vyaparix is an offline-first desktop billing software. It works flawlessly without internet on your Windows PC. Cloud backup to Google Drive happens automatically when internet is available."
          }
        },
        {
          "@type": "Question",
          "name": "Is Vyaparix compliant with Indian GST laws?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Vyaparix is 100% GST compliant. It supports Tax Invoices, Bill of Supply, Composition Invoices, Credit Notes, Debit Notes, and generates automatic GST summary Excel sheets."
          }
        },
        {
          "@type": "Question",
          "name": "What printers does Vyaparix support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vyaparix supports all A4/A5 laser and inkjet printers for paperwork, and all 2-inch and 3-inch thermal POS roll printers for retail checkout counters."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a limit on products or invoices?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Vyaparix offers unlimited invoices, unlimited products, unlimited customers, and unlimited suppliers with zero restrictions across all plans."
          }
        }
      ]
    }
